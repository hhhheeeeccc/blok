name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x AdBlockApp/gradlew
      continue-on-error: true

    - name: Build with Gradle
      run: |
        cd AdBlockApp
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew
        fi
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: blok-app-debug
        path: AdBlockApp/app/build/outputs/apk/debug/app-debug.apk
